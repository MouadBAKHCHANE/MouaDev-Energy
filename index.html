<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZEN ÉNERGIE SERVICES - Coming Soon</title>
    <style>
        /* Attempt to use DIN Pro and Helvetica Now Display, falling back to similar sans-serif fonts */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'DIN Pro', 'Helvetica Now Display', 'Inter', sans-serif;
            background: linear-gradient(135deg, #2c6262 0%, #2a9b96 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 4.5rem 3rem;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.25);
            max-width: 650px;
            width: 90%;
            border-bottom: 6px solid #50b5a2;
            color: #2c6262;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
            color: #2a9b96;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.25rem;
            margin-bottom: 2.5rem;
            font-weight: 400;
            color: #4a4a4a;
            line-height: 1.7;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            display: inline-block;
            color: #2c6262;
            text-transform: uppercase;
        }

        .highlight {
            color: #50b5a2;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">ZEN ÉNERGIE SERVICES</div>
        <h1>Site en Construction</h1>
        <p>Nous préparons quelque chose d'<span class="highlight">incroyable</span> pour vous. Restez à l'écoute et
            découvrez bientôt nos nouvelles performances !</p>
    </div>
</body>

</html>
